<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./CSS/base.css">
    <link rel="stylesheet" href="./CSS/componentes.css">
    <link rel="stylesheet" href="./CSS/layout.css">
    <link rel="stylesheet" href="./CSS/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header_content">
            <label for="menu-toggle" class="menu-btn">☰</label>
            <a href="index.html" class="logo-link"><img class="logo" src="./img/logo.png" alt="Logo CampusShop"></a>
            <a href="carrito.html" class="carrito-link"><img class="logo" src="./img/carrito.png" alt="Carrito de compras"></a>
        </div>
    </header>

    <input type="checkbox" id="menu-toggle">

    <nav class="menu">
      <ul>
        <li><a href="index.html">Home</a></li>
        <br>
        <li><a href="catalogo.html">Catálogo</a></li>
        <br>
        <li><a href="carrito.html">Carrito</a></li>
        <br>
        <li><a href="historial.html">Historial</a></li>
        <br>
        <li><a href="perfil.html">Perfil</a></li>
        <br>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>

    <main class="main_content">
        <section class="content-section">
            <h2 class="section-title">Mis productos de esta compra:</h2>
            <div class="grid-products">
                <article class="card">
                    <img class="product_image" src="./img/mouse_campus.webp" alt="Mouse Campuslands">
                    <div class="card_body">
                        <span class="badge">Oferta</span>
                        <h2>Mouse Campuslands</h2>
                        <div class="precio_total"><p>Q.140.00</p>
                        <button class="btn"><a href="./mouse.html">Ver producto</a></button>
                        <button class="btn">Quitar producto</button></div>
                    </div>
                </article>
                <article class="card">
                    <img class="product_image" src="./img/gorra_campus.webp" alt="Gorra Unisex Campuslands">
                    <div class="card_body">
                        <span class="badge">Oferta</span>
                        <h2>Gorra Unisex Campuslands</h2>
                        <div class="precio_total"><p>Q.120.00</p>
                        <button class="btn"><a href="./gorra.html">Ver producto</a></button>
                        <button class="btn">Quitar producto</button></div>
                    </div>
                </article>
                <article class="card">
                    <img class="product_image" src="./img/jogger-nasa.webp" alt="Jogger Nasa Campuslands">
                    <div class="card_body">
                        <span class="badge">Oferta</span>
                        <h2>Jogger Nasa Campuslands</h2>
                        <div class="precio_total"><p>Q.150.00</p>
                        <button class="btn"><a href="./jogger.html">Ver producto</a></button>
                        <button class="btn">Quitar producto</button></div>
                    </div>
                </article>
            </div>
        </section>
        <hr>
        <section class="content-section">
            <article class="card">
                <div class="card_body">
                    <span class="badge">Total</span>
                    <h2>Pedido #12345</h2>
                    <div class="precio_total"><p>Q.410.00</p>
                    <button class="btn"><a href="./checkout.html">Terminar compra</a></button></div>
                </div>
            </article>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p> &#174 CampusShop - Proyecto académico</p>
        </div>
    </footer>
</body>
</html>
